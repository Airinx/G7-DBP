<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If One Day You Turn Around</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div id="start-screen">
        <div class="title-container">
            <h1>If One Day You Turn Around</h1>
            <p>If one day you turn around… will the person standing there still be me?</p>
            <button onclick="startGame()">Start</button>
            <button onclick="showCredits()">Credit</button>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="{{ url_for('static', filename='music/bgm.mp3') }}" type="audio/mpeg">
    </audio>

    <div id="game-screen" class="hidden">
        <div class="character-area">
        <div id="character-sprite" class="sprite hidden"></div>
        </div>

        <div class="ui-bar">
            <div class="dialogue-box" onclick="nextDialogue()">
                <h3 id="char-name">Name</h3>
                <p id="dialogue-text"></p>
                <img id="chat-sticker" src="/static/images/sticker.png" class="hidden">         
                <div id="next-indicator">▼</div>
            </div>

            <div id="choices-box" class="choices-box">
                </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

<div id="coverScreen">...</div>
<div id="gameScreen" style="display:none;">...</div>

</body>
</html>
